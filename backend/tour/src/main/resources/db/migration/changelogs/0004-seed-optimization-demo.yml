              -- Date: 2026-04-20 (Monday)
              -- ──────────────────────────────────────────────────────────────

              -- Infrastructures: each producer has one depot + 1 dedicated coop hub
              INSERT INTO infrastructure
                (id, producer_id, dry_surface_m2, fresh_surface_m2, frozen_surface_m2, prep_surface_m2, depot_latitude, depot_longitude)
              VALUES
                ('aaaa1111-1111-1111-1111-111111111111', '11111111-1111-1111-1111-111111111111', 200, 100,  50, 30, 50.467400, 4.872000),  -- Producer A: Namur
                ('bbbb2222-2222-2222-2222-222222222222', '22222222-2222-2222-2222-222222222222', 180,  80,  40, 25, 50.632600, 5.579700),  -- Producer B: Liège
                ('cccc3333-3333-3333-3333-333333333333', '33333333-3333-3333-3333-333333333333', 220, 110,  60, 35, 50.850300, 4.351700),  -- Producer C: Bruxelles
                ('9999eeee-eeee-eeee-eeee-eeeeeeeeeeee', '99999999-9999-9999-9999-999999999999', 500, 250, 120, 90, 50.559600, 4.691300); -- Coop hub: Gembloux

