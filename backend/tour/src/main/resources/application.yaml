spring:
  application:
    name: tour

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  liquibase:
    enabled: true
    change-log: classpath:db/migration/db.changelog-master.yml
    contexts: default
    default-schema: public

wms.api:
  base-url: http://localhost:8081/api

# OSRM (routing distances)
# base-url peut être remplacé par votre instance locale (ex: http://localhost:5000)
# profile dépend de l’instance (ex: 'routed-car' sur routing.openstreetmap.de, ou 'car' sur OSRM vanilla)
osrm:
  enabled: true
  base-url: https://routing.openstreetmap.de
  profile: routed-car

---
spring:
  config:
    activate:
      on-profile: dev

  liquibase:
    contexts: dev