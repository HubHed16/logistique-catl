services:
  wms-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wms-api
    networks: [wms-net]
    ports:
      - "8081:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: wms
      DB_USER: wms_user
      DB_PASSWORD: wms_password
      SPRING_PROFILES_ACTIVE: dev

networks:
  wms-net:
    driver: bridge
